# Render.com Blueprint — runs the monitor as a background worker.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: worker
    name: sneaker-monitor
    runtime: python
    plan: starter
    rootDir: sneaker-monitor
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false                 # set in Render dashboard
      - key: POLL_INTERVAL_SECONDS
        value: "300"
      - key: SEED_ON_FIRST_RUN
        value: "true"
      - key: STORAGE_PATH
        value: /var/data/seen.json
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: monitor-data
      mountPath: /var/data
      sizeGB: 1
